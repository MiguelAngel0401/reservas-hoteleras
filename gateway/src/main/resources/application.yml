server:
  port: 8090

spring:
  application:
    name: gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9000/oauth2/jwks
  cloud:
    gateway:
      routes:
        - id: auth
          uri: http://localhost:9000
          predicates:
            - Path=/api/auth/**

        - id: mcv-habitaciones
          uri: lb://mcv-habitaciones
          predicates:
            - Path=/api/habitaciones/**

        - id: mcv-reservas
          uri: lb://mcv-reservas
          predicates:
            - Path=/api/reservas/**

        - id: huespedes
          uri: lb://huespedes
          predicates:
            - Path=/api/huespedes/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka